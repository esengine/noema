# Two-term sanity check. Known grokking task — should reach high accuracy.

n_terms: 2
thought_schedule:
  - [0, 0]
eval_n_thoughts: 0

block_size: 32
n_layer: 4
n_head: 4
n_embd: 128
dropout: 0.0

batch_size: 128
max_steps: 30000
eval_every: 1000
eval_iters: 32
lr: 1.0e-3
min_lr: 1.0e-4
warmup_steps: 500
weight_decay: 1.0
grad_clip: 1.0

device: cuda
dtype: bfloat16
out_dir: runs/phase1_n2_baseline
seed: 1337
