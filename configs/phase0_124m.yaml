# GPT-2 124M-class config. Tight fit on 8GB; needs grad_checkpointing=true.

train_bin: data/processed/train.bin
val_bin: data/processed/val.bin

vocab_size: 50304
block_size: 512
n_layer: 12
n_head: 12
n_embd: 768
dropout: 0.0

batch_size: 4
grad_accum_steps: 32
max_steps: 20000
eval_every: 500
eval_iters: 100
lr: 3.0e-4
min_lr: 3.0e-5
warmup_steps: 500
weight_decay: 0.1
grad_clip: 1.0

device: cuda
dtype: bfloat16
compile: false
grad_checkpointing: true

out_dir: runs/phase0_124m
seed: 1337
