# Phase 1 no-CoT baseline.

n_terms: 5
thought_schedule:
  - [0, 0]
eval_n_thoughts: 0

block_size: 64
n_layer: 8
n_head: 8
n_embd: 256
dropout: 0.0

batch_size: 128
max_steps: 30000
eval_every: 1000
eval_iters: 32
lr: 3.0e-4
min_lr: 3.0e-5
warmup_steps: 500
weight_decay: 0.1
grad_clip: 1.0

device: cuda
dtype: bfloat16
out_dir: runs/phase1_baseline
seed: 1337
