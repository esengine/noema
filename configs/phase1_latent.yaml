# Phase 1: latent-thinking arithmetic. Tiny model, large batch, curriculum on K.

n_terms: 5
# [step, K] pairs — at step >= threshold, use K thought tokens.
thought_schedule:
  - [0, 0]
  - [2000, 1]
  - [5000, 2]
eval_n_thoughts: 2

block_size: 64
n_layer: 6
n_head: 6
n_embd: 192
dropout: 0.0

batch_size: 64
max_steps: 10000
eval_every: 500
eval_iters: 32
lr: 3.0e-4
min_lr: 3.0e-5
warmup_steps: 200
weight_decay: 0.1
grad_clip: 1.0

device: cuda
dtype: bfloat16
out_dir: runs/phase1_latent
seed: 1337
